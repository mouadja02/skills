name: Build & Deploy

# Pull requests run a read-only validation gate. Pushes to main and manual runs
# repeat the gate from a clean checkout, build downloadable archives, and deploy
# docs/ to GitHub Pages (plus optional S3 upload).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "SKILLS.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate manifests and documentation indexes
        run: npm run build:manifest

      - name: Audit generated documentation
        run: npm run check:docs

      - name: Require generated documentation to be committed
        shell: bash
        run: |
          set -euo pipefail
          generated_paths=(README.md SKILLS.md docs/manifest.json docs/manifest.tsv skills/README.md skills/*/README.md)
          if ! git diff --exit-code -- "${generated_paths[@]}"; then
            echo "::error::Generated documentation is stale. Run npm run build:manifest and commit the results."
            exit 1
          fi

      - name: Build ZIP artifacts
        run: npm run build:zips

      - name: Audit ZIP artifacts
        run: npm run check:zips

  build-and-deploy:
    name: Build and deploy Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    env:
      HAS_AWS_S3_UPLOAD: ${{ secrets.AWS_S3_BUCKET != '' && secrets.AWS_REGION != '' && secrets.AWS_ROLE_TO_ASSUME != '' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate manifests and documentation indexes
        run: npm run build:manifest

      - name: Audit generated documentation
        run: npm run check:docs

      - name: Require generated documentation to be committed
        shell: bash
        run: |
          set -euo pipefail
          generated_paths=(README.md SKILLS.md docs/manifest.json docs/manifest.tsv skills/README.md skills/*/README.md)
          if ! git diff --exit-code -- "${generated_paths[@]}"; then
            echo "::error::Generated documentation is stale. Run npm run build:manifest and commit the results."
            exit 1
          fi

      - name: Inject AI chat configuration
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          set -euo pipefail
          PROXY="${PROXY_URL:-}"
          node -e 'const fs=require("fs"); const proxy=process.env.PROXY_URL || ""; fs.writeFileSync("docs/chat-config.js", `/* Auto-generated by CI — do not commit */\nwindow.CHAT_CFG = ${JSON.stringify({proxyUrl: proxy}, null, 2)};\n`);'
          if [ -n "$PROXY" ]; then
            echo "chat-config.js written with a configured proxy URL."
          else
            echo "WARNING: PROXY_URL secret is not set — chat will show a config error."
          fi

      - name: Resolve public ZIP base URL
        shell: bash
        env:
          PUBLIC_BASE_URL: ${{ secrets.SKILLS_PUBLIC_BASE_URL }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_PREFIX: ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          base=""
          release_id="$GITHUB_SHA"
          if [ "$HAS_AWS_S3_UPLOAD" = "true" ]; then
            base="$PUBLIC_BASE_URL"
            if [ -z "$base" ]; then
              prefix="${AWS_S3_PREFIX#/}"
              prefix="${prefix%/}"
              base="https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com"
              if [ -n "$prefix" ]; then
                base="${base}/${prefix}"
              fi
            fi
            case "$base" in *$'\n'*|*$'\r'*) echo "::error::Public ZIP base URL contains a newline"; exit 1;; esac
            base="${base%/}"
            base_hash="$(printf '%s' "$base" | sha256sum | cut -c1-12)"
            release_id="${GITHUB_SHA}-${base_hash}"
            base="${base}/zips/releases/${release_id}"
          fi
          echo "RELEASE_ID=$release_id" >> "$GITHUB_ENV"
          echo "SKILLS_PUBLIC_BASE_URL=$base" >> "$GITHUB_ENV"

      - name: Build ZIP artifacts into docs/zips/
        run: npm run build:zips

      - name: Audit ZIP artifacts
        run: npm run check:zips

      - name: Report artifact size
        run: du -sh docs/zips || true

      - name: Configure AWS credentials with OIDC
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload ZIP artifacts to S3
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        shell: bash
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PREFIX: ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${AWS_S3_PREFIX#/}"
          prefix="${prefix%/}"
          dest="s3://${AWS_S3_BUCKET}"
          if [ -n "$prefix" ]; then
            dest="${dest}/${prefix}"
          fi

          # Publish a complete immutable release first. The release key includes
          # both the source SHA and public-base configuration hash.
          # Keep every write under the pre-existing zips/ IAM scope while
          # retaining immutable, release-addressed object keys.
          release_dest="${dest}/zips/releases/${RELEASE_ID}"
          aws s3 sync docs/zips "${release_dest}/zips" \
            --no-progress \
            --cache-control "public, max-age=31536000, immutable"

          # One-time migration for legacy stable keys that were previously
          # marked immutable while their contents changed. Treat only a real
          # 404/NoSuchKey as absence; authorization/network errors fail closed.
          marker_key="${prefix:+${prefix}/}zips/.stable-cache-migrated-v2"
          marker="s3://${AWS_S3_BUCKET}/${marker_key}"
          head_error="$(mktemp)"
          migration_needed=false
          if aws s3api head-object --bucket "$AWS_S3_BUCKET" --key "$marker_key" >/dev/null 2>"$head_error"; then
            :
          elif grep -Eq '(^|[^0-9])404([^0-9]|$)|Not Found|NoSuchKey' "$head_error"; then
            migration_needed=true
          else
            cat "$head_error" >&2
            rm -f "$head_error"
            exit 1
          fi
          rm -f "$head_error"

          if [ "$migration_needed" = "true" ]; then
            legacy_prefix="${prefix:+${prefix}/}zips/"
            legacy_count="$(aws s3api list-objects-v2 --bucket "$AWS_S3_BUCKET" --prefix "$legacy_prefix" --max-items 1 --query 'length(Contents)' --output text)"
            if [ "$legacy_count" != "0" ] && [ "$legacy_count" != "None" ]; then
              aws s3 cp "${dest}/zips" "${dest}/zips" \
                --recursive \
                --no-progress \
                --metadata-directive REPLACE \
                --cache-control "public, max-age=300, must-revalidate"
            fi
            printf '%s\n' "$GITHUB_SHA" >/tmp/stable-cache-migrated-v2
            aws s3 cp /tmp/stable-cache-migrated-v2 "$marker" \
              --no-progress \
              --content-type "text/plain; charset=utf-8" \
              --cache-control "no-store"
          fi

          # Keep the legacy summary current for compatibility, then atomically
          # advance the release pointer only after every immutable object exists.
          aws s3 cp docs/zips/_summary.json "${dest}/zips/_summary.json" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60, must-revalidate"

          GITHUB_SHA="$GITHUB_SHA" RELEASE_ID="$RELEASE_ID" node -e 'const fs=require("fs"); const sha=process.env.GITHUB_SHA; const release=process.env.RELEASE_ID; fs.writeFileSync("/tmp/latest.json", JSON.stringify({schema_version:1, source_sha:sha, release:`zips/releases/${release}`, summary:`zips/releases/${release}/zips/_summary.json`}, null, 2)+"\n");'
          aws s3 cp /tmp/latest.json "${dest}/zips/latest.json" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60, must-revalidate"

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
