name: Build & Deploy

# Pull requests run a read-only validation gate. Pushes to main and manual runs
# repeat the gate from a clean checkout, build downloadable archives, and deploy
# docs/ to GitHub Pages (plus optional S3 upload).

on:
  pull_request:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "SKILLS.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/deploy-pages.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "README.md"
      - "SKILLS.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate repository
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate manifests and documentation indexes
        run: npm run build:manifest

      - name: Audit generated documentation
        run: npm run check:docs

      - name: Require generated documentation to be committed
        shell: bash
        run: |
          set -euo pipefail
          generated_paths=(README.md SKILLS.md docs/manifest.json docs/manifest.tsv skills/README.md skills/*/README.md)
          if ! git diff --exit-code -- "${generated_paths[@]}"; then
            echo "::error::Generated documentation is stale. Run npm run build:manifest and commit the results."
            exit 1
          fi

      - name: Build ZIP artifacts
        run: npm run build:zips

      - name: Audit ZIP artifacts
        run: npm run check:zips

  build-and-deploy:
    name: Build and deploy Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    env:
      HAS_AWS_S3_UPLOAD: ${{ secrets.AWS_S3_BUCKET != '' && secrets.AWS_REGION != '' && secrets.AWS_ROLE_TO_ASSUME != '' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate manifests and documentation indexes
        run: npm run build:manifest

      - name: Audit generated documentation
        run: npm run check:docs

      - name: Require generated documentation to be committed
        shell: bash
        run: |
          set -euo pipefail
          generated_paths=(README.md SKILLS.md docs/manifest.json docs/manifest.tsv skills/README.md skills/*/README.md)
          if ! git diff --exit-code -- "${generated_paths[@]}"; then
            echo "::error::Generated documentation is stale. Run npm run build:manifest and commit the results."
            exit 1
          fi

      - name: Inject AI chat configuration
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          set -euo pipefail
          PROXY="${PROXY_URL:-}"
          node -e 'const fs=require("fs"); const proxy=process.env.PROXY_URL || ""; fs.writeFileSync("docs/chat-config.js", `/* Auto-generated by CI — do not commit */\nwindow.CHAT_CFG = ${JSON.stringify({proxyUrl: proxy}, null, 2)};\n`);'
          if [ -n "$PROXY" ]; then
            echo "chat-config.js written with a configured proxy URL."
          else
            echo "WARNING: PROXY_URL secret is not set — chat will show a config error."
          fi

      - name: Resolve public ZIP base URL
        shell: bash
        env:
          PUBLIC_BASE_URL: ${{ secrets.SKILLS_PUBLIC_BASE_URL }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_S3_PREFIX: ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          base="$PUBLIC_BASE_URL"
          if [ -z "$base" ] && [ -n "$AWS_S3_BUCKET" ] && [ -n "$AWS_REGION" ]; then
            prefix="${AWS_S3_PREFIX#/}"
            prefix="${prefix%/}"
            base="https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com"
            if [ -n "$prefix" ]; then
              base="${base}/${prefix}"
            fi
          fi
          echo "SKILLS_PUBLIC_BASE_URL=$base" >> "$GITHUB_ENV"

      - name: Build ZIP artifacts into docs/zips/
        run: npm run build:zips

      - name: Audit ZIP artifacts
        run: npm run check:zips

      - name: Report artifact size
        run: du -sh docs/zips || true

      - name: Configure AWS credentials with OIDC
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload ZIP artifacts to S3
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        shell: bash
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PREFIX: ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${AWS_S3_PREFIX#/}"
          prefix="${prefix%/}"
          dest="s3://${AWS_S3_BUCKET}"
          if [ -n "$prefix" ]; then
            dest="${dest}/${prefix}"
          fi

          # Archive keys are stable and their contents change, so they must be
          # revalidated rather than cached as immutable for a year.
          aws s3 sync docs/zips "${dest}/zips" \
            --delete \
            --no-progress \
            --exclude "_summary.json" \
            --cache-control "public, max-age=300, must-revalidate"

          aws s3 cp docs/zips/_summary.json "${dest}/zips/_summary.json" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60, must-revalidate"

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
