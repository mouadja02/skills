name: Build & Deploy

# Builds the manifest, commits it back to main if changed, generates per-skill
# and per-category ZIP archives, injects the AI chat config, deploys docs/ to
# GitHub Pages, and optionally uploads ZIPs to S3.
# ZIPs are NOT committed to main; they live only in the Pages/S3 artifacts,
# keeping the main branch lean.

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write   # needed to commit regenerated manifest back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HAS_AWS_S3_UPLOAD: ${{ secrets.AWS_S3_BUCKET != '' && secrets.AWS_REGION != '' && secrets.AWS_ROLE_TO_ASSUME != '' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # required for the manifest commit-back step

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # ── 1. Build manifest ────────────────────────────────────────────────
      - name: Generate docs/manifest.{json,tsv} + SKILLS.md
        run: node scripts/build-manifest.mjs

      - name: Commit manifest if changed
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths="docs/manifest.json docs/manifest.tsv SKILLS.md"
          if git diff --quiet -- $paths; then
            echo "Manifest unchanged — skipping commit."
          else
            git add $paths
            git commit -m "chore(manifest): regenerate from SKILL.md frontmatter [skip ci]"
            git push
          fi

      # ── 2. Inject AI chat config ─────────────────────────────────────────
      - name: Inject AI chat configuration
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_MODEL:   ${{ secrets.NVIDIA_MODEL }}
        run: |
          set -euo pipefail
          MODEL="${NVIDIA_MODEL:-stepfun-ai/step-3.5-flash}"
          cat > docs/chat-config.js <<EOJS
          /* Auto-generated by CI — do not commit */
          window.CHAT_CFG = {
            apiKey: "${NVIDIA_API_KEY}",
            model:  "${MODEL}"
          };
          EOJS
          echo "chat-config.js written (key length: ${#NVIDIA_API_KEY})"

      # ── 3. Build ZIP artifacts ───────────────────────────────────────────
      - name: Resolve public ZIP base URL
        shell: bash
        env:
          PUBLIC_BASE_URL: ${{ secrets.SKILLS_PUBLIC_BASE_URL }}
          AWS_S3_BUCKET:   ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION:      ${{ secrets.AWS_REGION }}
          AWS_S3_PREFIX:   ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          base="$PUBLIC_BASE_URL"
          if [ -z "$base" ] && [ -n "$AWS_S3_BUCKET" ] && [ -n "$AWS_REGION" ]; then
            prefix="${AWS_S3_PREFIX#/}"
            prefix="${prefix%/}"
            base="https://${AWS_S3_BUCKET}.s3.${AWS_REGION}.amazonaws.com"
            if [ -n "$prefix" ]; then
              base="${base}/${prefix}"
            fi
          fi
          echo "SKILLS_PUBLIC_BASE_URL=$base" >> "$GITHUB_ENV"

      - name: Build ZIP artifacts into docs/zips/
        run: node scripts/build-zips.mjs

      - name: Report artifact size
        run: |
          du -sh docs/zips || true
          ls -la docs/zips || true

      # ── 4. Upload ZIPs to S3 (optional) ─────────────────────────────────
      - name: Configure AWS credentials with OIDC
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Upload ZIP artifacts to S3
        if: ${{ env.HAS_AWS_S3_UPLOAD == 'true' }}
        shell: bash
        env:
          AWS_S3_BUCKET:  ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_PREFIX:  ${{ secrets.AWS_S3_PREFIX }}
        run: |
          set -euo pipefail
          prefix="${AWS_S3_PREFIX#/}"
          prefix="${prefix%/}"
          dest="s3://${AWS_S3_BUCKET}"
          if [ -n "$prefix" ]; then
            dest="${dest}/${prefix}"
          fi

          aws s3 sync docs/zips "${dest}/zips" \
            --delete \
            --no-progress \
            --exclude "_summary.json" \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 cp docs/zips/_summary.json "${dest}/zips/_summary.json" \
            --no-progress \
            --content-type "application/json; charset=utf-8" \
            --cache-control "public, max-age=60, must-revalidate"

      # ── 5. Deploy to GitHub Pages ────────────────────────────────────────
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
